services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build: .
    environment:
      PORT: 8080
      JWT_SECRET: super-secreto-demo
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      INSTANCE_NAME: backend-1
    depends_on:
      - db

  backend2:
    build: .
    environment:
      PORT: 8080
      JWT_SECRET: super-secreto-demo
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      INSTANCE_NAME: backend-2
    depends_on:
      - db

  backend3:
    build: .
    environment:
      PORT: 8080
      JWT_SECRET: super-secreto-demo
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      INSTANCE_NAME: backend-3
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

volumes:
  postgres_data:
